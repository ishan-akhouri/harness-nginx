image:
  repository: nginx
  tag: this-tag-does-not-exist
replicaCount: 1
service:
  type: NodePort
  port: 80
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi
probes:
  liveness:
    path: /
    port: 80
    initialDelaySeconds: 10
    periodSeconds: 10
  readiness:
    path: /
    port: 80
    initialDelaySeconds: 5
    periodSeconds: 5
